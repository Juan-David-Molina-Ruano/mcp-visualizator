name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Verify all commits in PRs are signed
  verify-signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify commit signatures
        run: |
          echo "Checking commit signatures for PR ${{ github.event.pull_request.number }}"
          COMMITS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits --jq '.[].sha')
          for SHA in $COMMITS; do
            VERIFIED=$(gh api repos/${{ github.repository }}/commits/$SHA --jq '.commit.verification.verified')
            if [ "$VERIFIED" != "true" ]; then
              echo "ERROR: Commit $SHA is not signed/verified"
              exit 1
            fi
            echo "OK: Commit $SHA is verified"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Rust checks (skip until src-tauri/Cargo.toml exists)
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Check if Rust project exists
        id: check
        run: |
          if [ -f "src-tauri/Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Skipping Rust checks — src-tauri/Cargo.toml not found"
          fi
      - name: Install Rust
        if: steps.check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        if: steps.check.outputs.exists == 'true'
        run: cargo install tauri-cli --version "^2.0"
      - name: Format check
        if: steps.check.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Clippy
        if: steps.check.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo build --release
      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: src-tauri
        run: cargo test

  # Frontend checks (skip until package.json exists)
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Check if frontend project exists
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Skipping frontend checks — package.json not found"
          fi
      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
      - name: Type check
        if: steps.check.outputs.exists == 'true'
        run: npx tsc --noEmit
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint
      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: npm test
      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: npm run build