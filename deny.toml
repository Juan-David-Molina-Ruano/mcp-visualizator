# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
# v0.20+ format

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]

# Ignore transitive unmaintained advisories we can't control.
# GTK3 crates are Linux-only, pulled transitively by Tauri.
# unic-* crates are pulled transitively by Tauri's urlpattern dep.
# proc-macro-error is pulled transitively by GTK3's glib-macros.
ignore = [
    # GTK3 bindings — Linux-only, unmaintained (use gtk4-rs)
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error — transitive via GTK3's glib-macros
    "RUSTSEC-2024-0370",
    # unic-* crates — transitive via Tauri's urlpattern
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

[licenses]
# All licenses not in allow are denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
# Banned crates — known malicious or dangerous
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = [
    { name = "onering", reason = "RUSTSEC-2026-0175: malicious code, removed from crates.io" },
    { name = "logflux", reason = "RUSTSEC-2026-0171: malicious code, removed from crates.io" },
    { name = "exploration", reason = "RUSTSEC-2026-0155: malicious code, removed from crates.io" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
