# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
# This file defines supply chain policies for the MCP Visualizer project.

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
deny = []
copyleft = "warn"
default = "deny"

[bans]
# Banned crates — known malicious or dangerous
# These will fail CI if any dependency tree includes them
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = [
    { name = "onering", reason = "RUSTSEC-2026-0175: malicious code, removed from crates.io" },
    { name = "logflux", reason = "RUSTSEC-2026-0171: malicious code, removed from crates.io" },
    { name = "exploration", reason = "RUSTSEC-2026-0155: malicious code, removed from crates.io" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []