# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
# v0.20+ format

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]

# Unmaintained crates: only fail for workspace (direct) deps.
# Transitive unmaintained deps (gtk3 bindings via Tauri) are out of our control.
unmaintained = "workspace"

# Ignore specific advisories for transitive deps we can't control.
# These are Linux-only (GTK3) crates pulled transitively by Tauri.
# Safe to ignore when targeting Windows; revisit if targeting Linux.
ignore = []

[licenses]
# All licenses not in allow are denied by default.
# Removed deprecated fields: unlicensed, deny, copyleft, default, allow-osi-fsf-free.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
# Banned crates — known malicious or dangerous
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = [
    { name = "onering", reason = "RUSTSEC-2026-0175: malicious code, removed from crates.io" },
    { name = "logflux", reason = "RUSTSEC-2026-0171: malicious code, removed from crates.io" },
    { name = "exploration", reason = "RUSTSEC-2026-0155: malicious code, removed from crates.io" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
