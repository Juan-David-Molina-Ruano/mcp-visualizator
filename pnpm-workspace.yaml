# pnpm v11 supply chain security — maximum strictness
# Docs: https://pnpm.io/supply-chain-security
# Docs: https://pnpm.io/settings

# ─── BUILD SCRIPT CONTROL ───────────────────────────────────────────
# pnpm v11 blocks ALL lifecycle scripts by default.
# Only explicitly reviewed packages can run build scripts.
# Run "pnpm approve-builds" interactively when adding new build deps.
onlyBuiltDependencies:
  - esbuild
  - "@tauri-apps/cli"

# ─── SUPPLY CHAIN DELAY ─────────────────────────────────────────────
# Wait 48 hours before installing any newly published version.
# Malware is usually detected and removed within hours.
minimumReleaseAge: 2880 # 48 hours in minutes

# Fail if NO version in the requested range meets the age requirement.
# false (default) would fall back to a younger version — we don't want that.
minimumReleaseAgeStrict: true

# Fail if registry metadata lacks the time field (private registries/mirrors).
# We want strict enforcement — no silent fallbacks.
minimumReleaseAgeIgnoreMissingTime: false

# ─── TRUST POLICY ───────────────────────────────────────────────────
# Prevent installation if a package's trust level has decreased
# (e.g., was published by trusted publisher, now has no provenance).
trustPolicy: "no-downgrade"

# Ignore trust checks for packages published more than N minutes ago.
# Useful for very old packages that predate provenance signing.
# Set to 0 to never ignore (strictest). Set to ~2 years for legacy compat.
# trustPolicyIgnoreAfter: 1051200  # 2 years in minutes

# ─── EXOTIC DEPENDENCIES ────────────────────────────────────────────
# Block transitive deps from using git repos or tarball URLs.
# Only DIRECT dependencies may use exotic sources.
blockExoticSubdeps: true

# ─── VERSION PINNING ────────────────────────────────────────────────
# Pin exact versions when running pnpm add (no ^ or ~ prefix).
saveExact: true
# savePrefix is ignored when saveExact is true, but set it for clarity:
savePrefix: ""

# ─── PEER DEPENDENCIES ──────────────────────────────────────────────
# Fail if there's a missing or invalid peer dependency.
strictPeerDependencies: true

# ─── STORE INTEGRITY ────────────────────────────────────────────────
# Verify file contents before linking from store (default: true).
verifyStoreIntegrity: true
# Strict check for package name/version mismatches in store.
strictStorePkgContentCheck: true

# ─── DEPENDENCY VERIFICATION ────────────────────────────────────────
# Verify deps are up to date before running scripts.
# "error" = throw if node_modules is stale (strictest).
# "install" = auto-install if stale (default, also good).
verifyDepsBeforeRun: "error"

# ─── NODE VERSION ENFORCEMENT ───────────────────────────────────────
# Enforce the engines field in package.json of dependencies.
engineStrict: true

# ─── LOCKFILE ───────────────────────────────────────────────────────
# Never skip the lockfile — always lock dependencies.
lockfile: true
# In CI, use frozen lockfile to prevent silent updates.
# (set via CLI: pnpm install --frozen-lockfile)

# ─── OVERRIDES ──────────────────────────────────────────────────────
# Force semver to 7.x which has provenance attestation.
# @babel/core 7.x depends on semver@^6.3.1 but 6.x lacks provenance.
overrides:
  semver@^6.3.1: "7.7.3"
